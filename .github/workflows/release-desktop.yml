name: Release Desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate-version:
    name: Validate release version
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Match package version to tag
        working-directory: desktop
        run: |
          node -e "const version = require('./package.json').version; const expected = 'v' + version; if (process.env.GITHUB_REF_NAME !== expected) { console.error('Tag ' + process.env.GITHUB_REF_NAME + ' must match package version ' + expected); process.exit(1); }"

  build:
    name: Build (${{ matrix.platform }})
    needs: validate-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Windows
            os: windows-latest
            target: win
          - platform: macOS
            os: macos-latest
            target: mac
          - platform: Linux
            os: ubuntu-latest
            target: linux

    defaults:
      run:
        working-directory: desktop

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build release artifacts
        run: npm run dist -- --${{ matrix.target }} --x64 --publish never

      - name: Stage release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.target }}
          compression-level: 0
          if-no-files-found: error
          path: |
            desktop/dist/*.exe
            desktop/dist/*.dmg
            desktop/dist/*.zip
            desktop/dist/*.AppImage
            desktop/dist/*.deb
            desktop/dist/latest*.yml
            desktop/dist/*.blockmap

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: desktop-*
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: true
          files: release-assets/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
